name: Pipeline Compose Compile
description: Compile pipeline YAML into a static GitHub Actions workflow with native needs
branding:
  icon: code
  color: gray-dark
inputs:
  pipeline_file:
    description: Path to canonical pipeline YAML
    required: false
  pipeline_dir:
    description: Directory of pipeline YAML files (merged by pipeline needs)
    required: false
  pipeline_inline:
    description: Optional inline YAML override (experiments)
    required: false
    default: ''
  output:
    description: Output path for generated workflow (default .github/workflows/pipeline.yml)
    required: false
  workflow_output:
    description: Path embedded in compile-check job (defaults to output)
    required: false
  compile_action:
    description: Compile action ref for compile-check job (default aeswibon/pipeline-compose-compile@v1.10.0)
    required: false
  default_branch:
    description: Default branch in generated on.push.branches (default master)
    required: false
  check:
    description: Fail if output exists and differs from compiled result
    required: false
    default: 'false'
outputs:
  workflow_path:
    description: Path written when output is set
  workflow_yaml:
    description: Generated YAML when output is not set
runs:
  using: node24
  main: dist/index.js
